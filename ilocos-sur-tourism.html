<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ilocos Sur Province</title>

  <!-- Bootstrap framework retained (CDN) for responsive layout, offcanvas & modal -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" crossorigin="anonymous">

  <!-- Heritage display + body typefaces -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

  <style>
/* ===========================================================================
   This is the ENTIRE site in one file: markup, styles, and behavior.
   The original Flask backend, database, and template/static split have been
   collapsed into this single HTML document. The "API" and the registration
   "transaction" now run client-side as asynchronous (AJAX-style) JavaScript,
   and routing between the homepage, each category, the form, and the
   confirmation page is handled by a small hash-based router.

   The block below is the original stylesheet, followed by an
   "IMAGE BACKGROUND ADAPTATIONS" block that swaps the flat beige for a
   full-bleed scenic background (Bing-style) across every route.
   =========================================================================== */
/* ===========================================================================
   styles.css — Ilocos Sur Tourism Portal
   Custom styling layered on top of Bootstrap (PRD §3).

   Design direction: drawn from Vigan's own materials —
     · burnay terracotta clay        (the clay variables)
     · cobblestone charcoal          (Calle Crisologo at dusk)
     · antique limestone cream       (heritage facades)
     · glazed tile teal accent       (capiz-window trim)
   Every color and font here lives in one place so collaborators can re-skin
   the whole portal without touching markup or logic.
   =========================================================================== */

:root {
  /* Palette */
  --clay:        #b34a2a;
  --clay-deep:   #8f3a20;
  --clay-soft:   #d9836a;
  --char:        #2a2521;
  --char-soft:   #4a423b;
  --cream:       #f6f0e4;
  --cream-2:     #efe6d4;
  --paper:       #fffdf8;
  --teal:        #1f6f66;
  --gold:        #c89535;
  --line:        #e3d6bf;

  /* Type */
  --font-display: "Archivo", "Segoe UI", system-ui, sans-serif;
  --font-body:    "Inter", "Segoe UI", system-ui, sans-serif;

  /* Bootstrap overrides */
  --bs-body-font-family: var(--font-body);
  --bs-body-color: var(--char);
  --bs-body-bg: var(--cream);
}

* { -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-body);
  color: var(--char);
  background: var(--cream);
  /* Leave room for the fixed top bar */
  padding-top: 60px;
}

.container { max-width: 1120px; }

/* ---------------------------------------------------------------------------
   Display headings — heavy, with a restrained double-shadow that nods to the
   embossed poster lettering in the PRD mockups (the one deliberate flourish).
   --------------------------------------------------------------------------- */
.display-title,
.hero-title,
.section-title,
.cat-title,
.info-name {
  font-family: var(--font-display);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 0.98;
  color: var(--char);
}

.display-title {
  font-size: clamp(2.4rem, 6vw, 4rem);
  text-transform: uppercase;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.10);
  margin: 0;
}

.section-title {
  font-size: clamp(1.9rem, 4.5vw, 2.8rem);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  margin-bottom: 1rem;
}

.section-lead { color: var(--char-soft); margin-bottom: 1.75rem; }

/* ===========================================================================
   TOP BAR + HAMBURGER
   =========================================================================== */
.topbar {
  position: fixed;
  inset: 0 0 auto 0;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0 1rem;
  background: var(--char);
  color: var(--cream);
  z-index: 1040;
  box-shadow: 0 2px 14px rgba(0,0,0,0.18);
}

.hamburger {
  width: 46px; height: 40px;
  display: inline-flex; flex-direction: column;
  justify-content: center; gap: 5px;
  padding: 0 9px;
  background: transparent;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s ease;
}
.hamburger:hover,
.hamburger:focus-visible { background: rgba(255,255,255,0.12); }
.hamburger span {
  display: block; height: 3.5px; border-radius: 2px;
  background: var(--cream);
  transition: transform 0.2s ease;
}

.topbar-brand {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.05rem;
  letter-spacing: 0.01em;
  color: var(--cream);
  text-decoration: none;
}
.topbar-brand:hover { color: var(--clay-soft); }

.topbar-cta {
  margin-left: auto;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--char);
  background: var(--gold);
  padding: 0.45rem 0.95rem;
  border-radius: 999px;
  text-decoration: none;
  transition: transform 0.12s ease, background 0.15s ease;
}
.topbar-cta:hover { background: #d9a942; transform: translateY(-1px); color: var(--char); }

/* ===========================================================================
   CATEGORIES OFFCANVAS (scrollable)
   =========================================================================== */
.cat-offcanvas {
  width: min(360px, 86vw);
  background: var(--cream);
  border-right: 4px solid var(--clay);
}
.cat-offcanvas .offcanvas-header {
  background: var(--char);
  color: var(--cream);
  padding: 1.1rem 1.25rem;
}
.cat-title {
  font-size: 2rem;
  text-transform: uppercase;
  color: var(--cream);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  margin: 0;
}
.cat-offcanvas .btn-close {
  filter: invert(1) grayscale(1) brightness(1.6);
}

.cat-scroll { overflow-y: auto; padding: 0.5rem 0; }
.cat-nav { display: flex; flex-direction: column; }

.cat-link {
  display: block;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--line);
  text-decoration: none;
  color: var(--char);
  transition: background 0.14s ease, padding-left 0.14s ease;
}
.cat-link:hover { background: var(--cream-2); padding-left: 1.6rem; }
.cat-link.is-active {
  background: var(--cream-2);
  box-shadow: inset 4px 0 0 var(--clay);
}
.cat-link-title {
  display: block;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.12rem;
  text-transform: uppercase;
  letter-spacing: -0.01em;
}
.cat-link-tag { display: block; font-size: 0.82rem; color: var(--char-soft); }

.cat-link--cta { background: rgba(179,74,42,0.08); }
.cat-link--cta .cat-link-title { color: var(--clay-deep); }

.offcanvas-footer {
  padding: 0.85rem 1.25rem;
  border-top: 1px solid var(--line);
  color: var(--char-soft);
}

/* ===========================================================================
   HERO + HISTORY (homepage)
   =========================================================================== */
.hero { background: linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%); padding: 3rem 0 1rem; }
.hero-inner { text-align: center; }
.hero-eyebrow {
  text-transform: uppercase; letter-spacing: 0.18em;
  font-size: 0.78rem; font-weight: 700; color: var(--clay);
  margin-bottom: 0.25rem;
}
.hero-title { font-size: clamp(3rem, 9vw, 6rem); text-shadow: 3px 3px 0 rgba(0,0,0,0.10); }
.hero-sub { color: var(--char-soft); font-size: 1.05rem; max-width: 36ch; margin: 0.5rem auto 1.75rem; }

.hero-frame {
  margin: 0 auto;
  max-width: 1000px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 12px;
  box-shadow: 0 18px 40px rgba(42,37,33,0.14);
}
.hero-img { width: 100%; height: auto; border-radius: 12px; display: block; }

.history { padding: 3.25rem 0; }
.history-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-left: 6px solid var(--clay);
  border-radius: 14px;
  padding: 1.75rem 1.9rem;
  box-shadow: 0 10px 26px rgba(42,37,33,0.07);
  max-height: 460px;          /* PRD: history block is scrollable */
  overflow-y: auto;
  justify-content: center;
  text-align: justify;
}
.history-card p { margin-bottom: 1rem; line-height: 1.75; }
.history-card p:last-child { margin-bottom: 0; }

/* ===========================================================================
   EXPLORE GRID (homepage shortcuts)
   =========================================================================== */
.explore { padding: 1rem 0 3.5rem; }
.explore-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.1rem;
}
.explore-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  text-decoration: none;
  color: var(--char);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.explore-card:hover { transform: translateY(-4px); box-shadow: 0 16px 30px rgba(42,37,33,0.13); color: var(--char); }
.explore-thumb { width: 100%; aspect-ratio: 3/2; object-fit: cover; display: block; }
.explore-body { padding: 0.85rem 1rem 1.1rem; }
.explore-name { font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; margin: 0 0 0.2rem; }
.explore-tag { font-size: 0.85rem; color: var(--char-soft); margin: 0; }

/* ===========================================================================
   CATEGORY PAGE — scrollable card grid
   =========================================================================== */
.category { padding: 2.5rem 0 3.5rem; }
.category-head { margin-bottom: 1.75rem; }
.category-tag { color: var(--char-soft); margin-top: 0.4rem; font-size: 1.05rem; }

.cards-status {
  display: flex; align-items: center; gap: 0.65rem;
  color: var(--char-soft); padding: 1.5rem 0;
}
.cards-status[hidden] { display: none; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 1.25rem;
  /* PRD: "Make this scrollable" — the grid scrolls within the viewport */
  max-height: calc(100vh - 230px);
  overflow-y: auto;
  padding: 4px 4px 1.5rem;
}

/* The attraction card: gray card holding a white image placeholder, name,
   and a "See Info" affordance — matching the FOOD #1 / FOOD #2 mockup. */
.attraction-card {
  background: var(--cream-2);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 12px;
  display: flex; flex-direction: column;
  box-shadow: 0 6px 16px rgba(42,37,33,0.08);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.attraction-card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(42,37,33,0.15); }
.attraction-media {
  background: var(--paper);
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 4/3;
}
.attraction-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
.attraction-name {
  font-family: var(--font-display);
  font-weight: 800; text-transform: uppercase;
  font-size: 1.08rem; letter-spacing: -0.01em;
  margin: 0.7rem 0 0.15rem;
}
.attraction-summary { font-size: 0.86rem; color: var(--char-soft); margin: 0 0 0.85rem; flex: 1; }
.see-info {
  align-self: flex-start;
  font-weight: 600; font-size: 0.9rem;
  color: var(--clay-deep);
  background: transparent; border: 0; cursor: pointer;
  padding: 0.25rem 0; 
}
.see-info::after { content: " →"; }
.see-info:hover { color: var(--clay); text-decoration: underline; }

/* ===========================================================================
   INFO CARD MODAL — blurred background, sharp card (PRD §7)
   The modal lives OUTSIDE .site-main (see base.html), so blurring the page
   wrapper leaves the card itself perfectly sharp.
   =========================================================================== */
/* Blur everything behind the card while it's open. */
body.info-modal-active .topbar,
body.info-modal-active .site-main,
body.info-modal-active .site-footer {
  filter: blur(7px);
  transition: filter 0.2s ease;
}

/* Soften Bootstrap's backdrop into a light frosted veil so the blurred page
   shows through, instead of a heavy dark layer that hides everything. */
body.info-modal-active .modal-backdrop.show {
  --bs-backdrop-opacity: 0.28;
  background-color: var(--char);
}

.info-modal .modal-content { border: 0; }
.info-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}
.info-close {
  position: absolute; top: 0.9rem; right: 0.9rem; z-index: 3;
  background-color: var(--paper); border-radius: 50%;
  padding: 0.55rem; opacity: 0.9;
}
.info-body { padding: 0; }
.info-media { background: var(--cream-2); }
.info-img { width: 100%; max-height: 280px; object-fit: cover; display: block; }
.info-text { padding: 1.5rem 1.75rem 1.9rem; }
.info-eyebrow {
  text-transform: uppercase; letter-spacing: 0.16em;
  font-size: 0.74rem; font-weight: 800; color: var(--clay);
  margin: 0 0 0.2rem;
}
.info-name { font-size: 1.9rem; text-transform: uppercase; margin: 0 0 0.35rem; }
.info-location { color: var(--teal); font-weight: 600; font-size: 0.92rem; margin: 0 0 0.75rem; }
.info-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.9rem; }
.info-chip {
  font-size: 0.74rem; font-weight: 600;
  background: var(--cream-2); color: var(--char-soft);
  border: 1px solid var(--line);
  padding: 0.22rem 0.6rem; border-radius: 999px;
}
.info-about { line-height: 1.7; margin-bottom: 1.25rem; }

/* ===========================================================================
   BUTTONS (clay)
   =========================================================================== */
.btn-clay {
  background: var(--clay); border: 1px solid var(--clay);
  color: var(--paper); font-weight: 600;
  border-radius: 999px;
  transition: background 0.15s ease, transform 0.12s ease;
}
.btn-clay:hover { background: var(--clay-deep); border-color: var(--clay-deep); color: var(--paper); transform: translateY(-1px); }
.btn-outline-clay {
  background: transparent; border: 1px solid var(--clay);
  color: var(--clay-deep); font-weight: 600; border-radius: 999px;
}
.btn-outline-clay:hover { background: var(--clay); color: var(--paper); }

/* ===========================================================================
   REGISTRATION FORM
   =========================================================================== */
.register { padding: 2.5rem 0 4rem; }
.register-inner { max-width: 760px; }
.register-head { margin-bottom: 1.5rem; }
.register-tag { color: var(--char-soft); margin-top: 0.5rem; }
.register-form {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 1.75rem;
  box-shadow: 0 12px 30px rgba(42,37,33,0.08);
}
.form-label { font-weight: 600; }
.form-label .opt { font-weight: 400; color: var(--char-soft); font-size: 0.85em; }
.form-control:focus, .form-select:focus {
  border-color: var(--clay-soft);
  box-shadow: 0 0 0 0.2rem rgba(179,74,42,0.18);
}
.field-error { color: #b3261e; font-size: 0.82rem; min-height: 1rem; margin-top: 0.25rem; }
.is-invalid-field { border-color: #b3261e !important; }
.register-actions { margin-top: 1.5rem; }
.btn-spinner { margin-left: 0.5rem; }

.form-banner {
  margin-top: 1.25rem;
  background: #fdecea; border: 1px solid #f5c6c0; color: #8a1c12;
  border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.92rem;
}

/* ===========================================================================
   CONFIRMATION / PROFILE
   =========================================================================== */
.confirm { padding: 2.75rem 0 4rem; }
.confirm-inner { max-width: 720px; }
.confirm-badge {
  display: inline-block;
  background: var(--teal); color: var(--paper);
  font-weight: 700; font-size: 0.85rem;
  padding: 0.3rem 0.85rem; border-radius: 999px;
  margin-bottom: 0.85rem;
}
.confirm-tag { color: var(--char-soft); margin: 0.5rem 0 1.5rem; }
.profile-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 0.5rem 1.5rem;
  box-shadow: 0 12px 30px rgba(42,37,33,0.08);
}
.profile-row {
  display: flex; justify-content: space-between; gap: 1rem;
  padding: 0.85rem 0; border-bottom: 1px solid var(--line);
}
.profile-row:last-child { border-bottom: 0; }
.profile-key { color: var(--char-soft); font-weight: 600; }
.profile-val { text-align: right; font-weight: 500; word-break: break-word; }
.confirm-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap; }

/* ===========================================================================
   FOOTER + 404
   =========================================================================== */
.site-footer {
  background: var(--char); color: var(--cream);
  text-align: center; padding: 2rem 1rem;
}
.site-footer .text-muted { color: #b9ad99 !important; }
.notfound { padding: 5rem 0; }
.notfound-lead { color: var(--char-soft); font-size: 1.1rem; margin: 1rem 0 1.75rem; }

/* ===========================================================================
   ACCESSIBILITY + MOTION
   =========================================================================== */
a:focus-visible, button:focus-visible, .form-control:focus-visible {
  outline: 3px solid var(--gold); outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

@media (max-width: 576px) {
  .topbar-brand { display: none; }
  .info-name { font-size: 1.55rem; }
  .card-grid { max-height: none; overflow: visible; } /* let page scroll on phones */
}


/* ===========================================================================
   IMAGE BACKGROUND ADAPTATIONS (single-file build)
   A full-bleed dusk image sits behind every view. Large titles and the text
   that floats directly on the photo are lightened for contrast, while the
   content panels (cards, forms) keep their solid surfaces for readability.
   To use a real photo instead of the built-in scene, replace the --bg-image
   URL below with your own (e.g. url("static/img/vigan.jpg")). It applies to
   every route automatically.
   =========================================================================== */
:root{
  --bg-image: url("app-images/IlocosBG.jpg");
  --scrim: linear-gradient(180deg, rgba(11, 8, 6, 0.42) 0%, rgba(24,15,10,0.26) 42%, rgba(24,15,10,0.40) 100%);
}
body{
  background-image: var(--scrim), var(--bg-image);
  background-repeat: no-repeat, no-repeat;
  background-size: cover, cover;
  background-position: center top, center top;
  background-attachment: fixed, fixed;
  min-height: 100vh;
}
.hero{ background: transparent; }
.hero-title,.section-title,.display-title{
  color:#fff6e9;
  text-shadow:0 2px 18px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.6);
}
/* keep the modal title dark on its paper card */
.info-name{ color:var(--char); text-shadow:none; }
.hero-eyebrow{ color:#ffd9a8; text-shadow:0 1px 8px rgba(0,0,0,0.55); }
.hero-sub,.section-lead,.category-tag,.register-tag,.confirm-tag,.notfound-lead{
  color:rgba(255,248,238,0.96);
  text-shadow:0 1px 10px rgba(0,0,0,0.55);
}
.cards-status{ color:rgba(255,248,238,0.96); text-shadow:0 1px 8px rgba(0,0,0,0.55); }
.cards-status .spinner-border{ color:#fff6e9; }
.history-card,.hero-frame,.explore-card,.attraction-card,.register-form,.profile-card{
  box-shadow:0 18px 44px rgba(0,0,0,0.28);
}
  </style>
</head>
<body>

  <!-- TOP BAR — the three-lined (hamburger) icon at the top-left opens the
       Categories menu, exactly as in the original design. -->
  <header class="topbar">
    <button class="hamburger" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#categoriesMenu"
            aria-controls="categoriesMenu" aria-label="Open categories menu">
      <span></span><span></span><span></span>
    </button>
    <a class="topbar-brand" href="#/">Ilocos&nbsp;Sur</a>
    <a class="topbar-cta" href="#/register">Book&nbsp;a&nbsp;Visit</a>
  </header>

  <!-- CATEGORIES OFFCANVAS — slides in from the left, body is scrollable.
       Its links are built from the data by JavaScript. -->
  <div class="offcanvas offcanvas-start cat-offcanvas" tabindex="-1"
       id="categoriesMenu" aria-labelledby="categoriesMenuLabel">
    <div class="offcanvas-header">
      <h2 class="cat-title" id="categoriesMenuLabel">Categories</h2>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
    </div>
    <div class="offcanvas-body cat-scroll">
      <nav class="cat-nav" id="catNav"><!-- built by JS --></nav>
    </div>
    <div class="offcanvas-footer"><small>Ilocos Sur Tourism Portal</small></div>
  </div>

  <!-- MAIN CONTENT — each route renders here -->
  <main class="site-main" id="app"></main>

  <footer class="site-footer">
    <div class="container">
      <p class="mb-1"><strong>Ilocos Sur Tourism Portal</strong></p>
      <p class="mb-0 text-muted small">
        Final Requirement for the course <strong>COMP 016</strong> &middot; Web Development
      </p>
    </div>
  </footer>

  <!-- INFO CARD MODAL — kept OUTSIDE #app so the background can be blurred
       while the card itself stays sharp. Filled in by JS on category pages. -->
  <div class="modal fade info-modal" id="infoModal" tabindex="-1"
       aria-labelledby="infoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content info-card">
        <button type="button" class="btn-close info-close" data-bs-dismiss="modal"
                aria-label="Close"></button>
        <div class="modal-body info-body">
          <div class="info-media">
            <img id="infoImage" class="info-img" src="" alt="">
          </div>
          <div class="info-text">
            <p class="info-eyebrow">About</p>
            <h2 class="info-name" id="infoModalLabel"></h2>
            <p class="info-location" id="infoLocation"></p>
            <div class="info-tags" id="infoTags"></div>
            <p class="info-about" id="infoAbout"></p>
            <a class="btn btn-clay info-book" id="infoBook" href="#/register">
              Plan a visit here
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS bundle (offcanvas, modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          crossorigin="anonymous"></script>

  <script>
/* ===========================================================================
   ALL APPLICATION LOGIC (was: data/attractions.py, store.py, app.py,
   ajax_handlers.js). Pure vanilla JavaScript.
   =========================================================================== */
(function () {
  "use strict";

  /* ----- content data (was data/attractions.py) ------------------------- */
  var DATA = {

  function uuid(){
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
      var r = Math.random()*16|0, v = c==="x"?r:(r&0x3|0x8); return v.toString(16);
    });
  }

  /* ----- placeholder image generator (was the Flask /placeholder route) -- */
  function placeholderURI(text, w, h){
    w = w||640; h = h||420;
    var fs = Math.max(14, Math.floor(Math.min(w,h)/9));
    var t = esc(text);
    var svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'
      + '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">'
      + '<stop offset="0" stop-color="#e9dcc6"/><stop offset="1" stop-color="#d8c3a3"/></linearGradient></defs>'
      + '<rect width="100%" height="100%" fill="url(#g)"/>'
      + '<rect x="6" y="6" width="'+(w-12)+'" height="'+(h-12)+'" fill="none" stroke="#b9986a" stroke-width="2" stroke-dasharray="9 7"/>'
      + '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="'+fs+'" fill="#7a5a35">'+t+'</text>'
      + '<text x="50%" y="'+(h-18)+'" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9a7a52">image placeholder</text>'
      + '</svg>';
    return "data:image/svg+xml;base64," + b64(svg);
  }

  // Build an <img> for an item: use its real image if set (falling back to a
  // generated placeholder if that file is missing), else the placeholder.
  function imgTag(item, w, h, cls){
    var ph = placeholderURI(item.name, w, h);
    var src = item.image ? item.image : ph;
    return '<img class="'+cls+'" src="'+esc(src)+'" alt="'+esc(item.name)+'" loading="lazy" '
         + 'onerror="this.onerror=null;this.src=\''+ph+'\'">';
  }

  /* ----- in-memory store (was the database) ------------------------------ */
  // Records live only for this browser session; reloading clears them.
  var store = { regs: {} };

  /* ----- async "API" (was the Flask JSON endpoints) ---------------------- */
  // Small delays make the asynchronous (AJAX-style) loading states visible.
  var EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;

  function isValidCategory(slug){
    return DATA.categories.some(function(c){ return c.slug === slug; });
  }
  function getCategory(slug){
    return DATA.categories.filter(function(c){ return c.slug === slug; })[0] || null;
  }

  var api = {
    getCategories: function(){
      return delay(40).then(function(){ return DATA.categories.slice(); });
    },
    getAttractions: function(slug){
      return delay(140).then(function(){
        if (!isValidCategory(slug)) { var e = new Error("Unknown category"); e.status = 404; throw e; }
        return { category: getCategory(slug), items: (DATA.items[slug] || []).slice() };
      });
    },
    getItem: function(slug, id){
      return delay(90).then(function(){
        var item = (DATA.items[slug] || []).filter(function(i){ return i.id === id; })[0];
        if (!item) { var e = new Error("Item not found"); e.status = 404; throw e; }
        return item;
      });
    },
    register: function(payload){
      return delay(160).then(function(){
        var res = validateRegistration(payload);
        if (Object.keys(res.errors).length){
          var e = new Error("validation"); e.errors = res.errors; throw e;
        }
        var rec = res.cleaned;
        rec.id = uuid();
        rec.created_at = new Date().toISOString();
        store.regs[rec.id] = rec;          // "persist" in memory
        return rec;
      });
    },
    getRegistration: function(id){
      return delay(120).then(function(){
        var rec = store.regs[id];
        if (!rec) { var e = new Error("Registration not found"); e.status = 404; throw e; }
        return rec;
      });
    }
  };

  /* ----- validation (ported from the Flask backend) ---------------------- */
  function validateRegistration(p){
    p = p || {};
    var errors = {}, cleaned = {};

    var fullName = String(p.full_name||"").trim();
    if (fullName.length < 2) errors.full_name = "Please enter your full name.";
    cleaned.full_name = fullName;

    var email = String(p.email||"").trim();
    if (!EMAIL_RE.test(email)) errors.email = "Please enter a valid email address.";
    cleaned.email = email;

    cleaned.phone = String(p.phone||"").trim();

    var category = String(p.category||"").trim();
    if (category && !isValidCategory(category)) errors.category = "Please choose a valid category.";
    cleaned.category = category;

    cleaned.attraction = String(p.attraction||"").trim();

    var visit = String(p.visit_date||"").trim();
    if (visit){
      var ok = /^\d{4}-\d{2}-\d{2}$/.test(visit) && !isNaN(new Date(visit).getTime());
      if (!ok) errors.visit_date = "Please use a valid date.";
    }
    cleaned.visit_date = visit;

    var travelers = parseInt(p.travelers, 10);
    if (isNaN(travelers) || travelers < 1 || travelers > 100){
      errors.travelers = "Travelers must be a number between 1 and 100.";
      travelers = null;
    }
    cleaned.travelers = travelers;

    cleaned.notes = String(p.notes||"").trim();
    return { cleaned: cleaned, errors: errors };
  }

  // Category page: load the card grid asynchronously.
  function loadCategoryCards(slug){
    var grid = $("#cardGrid"), statusEl = $("#cardsStatus");
    api.getAttractions(slug).then(function(data){
      statusEl.hidden = true;
      grid.innerHTML = "";
      if (!data.items.length){
        grid.innerHTML = '<p class="text-muted">Listings are coming soon.</p>';
        return;
      }
      grid.innerHTML = data.items.map(function(item){
        return ''
        + '<article class="attraction-card">'
        +   '<div class="attraction-media">'+imgTag(item, 640, 420, "")+'</div>'
        +   '<h3 class="attraction-name">'+esc(item.name)+'</h3>'
        +   '<p class="attraction-summary">'+esc(item.summary||"")+'</p>'
        +   '<button class="see-info" type="button" data-id="'+esc(item.id)+'">See Info</button>'
        + '</article>';
      }).join("");

      Array.prototype.forEach.call(grid.querySelectorAll(".see-info"), function(btn){
        btn.addEventListener("click", function(){ openInfo(slug, btn.getAttribute("data-id")); });
      });
    }).catch(function(err){
      statusEl.hidden = false;
      statusEl.innerHTML = '<span>Couldn\'t load this category. ' + esc(err.message) + '</span>';
    });

      $("#infoImage").alt = item.name;

  // Registration form: async submit, then route to the confirmation page.
  function wireRegister(){
    var form = $("#registerForm");
    if (!form) return;
    var submitBtn = $("#submitBtn"), spinner = $(".btn-spinner", submitBtn), banner = $("#formBanner");

    form.addEventListener("submit", function(e){
      e.preventDefault();                 // no page reload
      clearErrors();
      setLoading(true);

      var payload = {
        full_name: val("full_name"), email: val("email"), phone: val("phone"),
        category: val("category"), attraction: val("attraction"),
        visit_date: val("visit_date"), travelers: val("travelers"), notes: val("notes")
      };

      api.register(payload).then(function(reg){
        // success -> go to confirmation, which fetches + reflects the record
        location.hash = "#/confirmation/" + reg.id;
      }).catch(function(err){
        if (err && err.errors) showErrors(err.errors);
        else showBanner("Something went wrong. Please try again.");
        setLoading(false);
      });
    });

    function setLoading(on){ submitBtn.disabled = on; if (spinner) spinner.hidden = !on; }
    function clearErrors(){
      banner.hidden = true; banner.textContent = "";
      Array.prototype.forEach.call(document.querySelectorAll(".field-error"), function(n){ n.textContent = ""; });
      Array.prototype.forEach.call(document.querySelectorAll(".is-invalid-field"), function(n){ n.classList.remove("is-invalid-field"); });
    }
    function showErrors(errs){
      Object.keys(errs).forEach(function(field){
        if (field === "_server"){ showBanner(errs[field]); return; }
        var slot = document.querySelector('.field-error[data-error-for="'+field+'"]');
        if (slot) slot.textContent = errs[field];
        var input = document.getElementById(field);
        if (input) input.classList.add("is-invalid-field");
      });
    }
    function showBanner(msg){ banner.hidden = false; banner.textContent = msg; }
    function val(id){ var n = document.getElementById(id); return n ? n.value.trim() : ""; }
  }

  // Confirmation page: fetch the stored record and reflect it on screen.
  function loadRegistration(id){
    var statusEl = $("#confirmStatus"), content = $("#confirmContent"), errorEl = $("#confirmError");
    api.getRegistration(id).then(function(reg){
      var dash = "—";
      var cat = String(reg.category || "");
      var prettyCat = cat ? cat.charAt(0).toUpperCase() + cat.slice(1) : dash;
      setText("p_id", reg.id || dash);
      setText("p_name", reg.full_name || dash);
      setText("p_email", reg.email || dash);
      setText("p_phone", reg.phone || dash);
      setText("p_category", prettyCat);
      setText("p_attraction", reg.attraction || dash);
      setText("p_visit_date", reg.visit_date || dash);
      setText("p_travelers", reg.travelers != null ? String(reg.travelers) : dash);
      setText("p_notes", reg.notes || dash);
      setText("p_created", formatDate(reg.created_at));
      statusEl.hidden = true; content.hidden = false;
    }).catch(function(err){
      statusEl.hidden = true; errorEl.hidden = false;
      errorEl.textContent = (err.status === 404)
        ? "We couldn't find that registration. It may have expired or the link is incorrect."
        : "Could not load your registration: " + err.message;
    });

    function setText(id, t){ var n = document.getElementById(id); if (n) n.textContent = t; }
    function formatDate(iso){
      if (!iso) return "—";
      var d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
    }
  }

  function closeOverlays(){
    if (!window.bootstrap) return;
    var oc = $("#categoriesMenu"); var oi = bootstrap.Offcanvas.getInstance(oc);
    if (oi) oi.hide();
    var m = bootstrap.Modal.getInstance($("#infoModal"));
    if (m) m.hide();

  function parseHash(){
    var h = (location.hash || "").replace(/^#/, "");
    if (!h || h === "/") return { name: "home" };
    var parts = h.split("?");
    var path = parts[0], qs = parts[1] || "";
    var query = {};
    if (qs) qs.split("&").forEach(function(pair){
      var kv = pair.split("="); query[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || "");
    });
    var segs = path.split("/").filter(Boolean);
    if (!segs.length) return { name: "home" };
    if (segs[0] === "register") return { name: "register", query: query };
    if (segs[0] === "confirmation") return { name: "confirmation", id: segs[1], query: query };
    return { name: "category", slug: segs[0], query: query };
  }

  function render(){
    var app = $("#app");
    var r = parseHash();
    closeOverlays();

    if (r.name === "home"){
      app.innerHTML = viewHome();
    } else if (r.name === "register"){
      app.innerHTML = viewRegister(r.query || {});
      wireRegister();
    } else if (r.name === "confirmation"){
      app.innerHTML = viewConfirmation(r.id);
      loadRegistration(r.id);
    } else if (r.name === "category" && isValidCategory(r.slug)){
      app.innerHTML = viewCategory(r.slug);
      loadCategoryCards(r.slug);
    } else {
      app.innerHTML = view404();
    }

    setActiveNav(r.name, r.slug);
    window.scrollTo(0, 0);
  }

  /* ----- boot ------------------------------------------------------------ */
  window.addEventListener("hashchange", render);
  document.addEventListener("DOMContentLoaded", function(){
    buildCategoryNav();
    render();
  });
})();
  </script>
</body>
</html>
